<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxyTrace · Medical</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { background-color: #070b0f; color: #e0f4ff; font-family: 'IBM Plex Mono', monospace; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    /* Custom Checkbox Style */
    .chk-container {
      background: rgba(13, 21, 32, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
    }
    .chk-container:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
    /* When checkbox is checked, highlight the div */
    .chk-container:has(input:checked) {
      border-color: #00d4ff;
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-sm mb-8 flex gap-2">
    <div class="h-1 flex-1 bg-cyan-500 rounded"></div>
    <div class="h-1 flex-1 bg-cyan-500 rounded shadow-[0_0_10px_#00d4ff]"></div>
  </div>

  <div class="w-full max-w-sm">
    <h2 class="text-2xl font-orbitron text-white mb-2">Medical Profile</h2>
    <p class="text-gray-400 text-xs mb-6">Select any respiratory conditions to calibrate the AI risk model.</p>

    <div class="space-y-3 mb-8">
      <label class="chk-container flex items-center p-4 rounded-lg cursor-pointer">
        <input type="checkbox" value="Asthma" class="w-5 h-5 accent-cyan-500 mr-4">
        <div>
          <span class="block font-bold text-white text-sm">Asthma</span>
          <span class="text-[10px] text-gray-400">Bronchial sensitivity</span>
        </div>
      </label>

      <label class="chk-container flex items-center p-4 rounded-lg cursor-pointer">
        <input type="checkbox" value="COPD" class="w-5 h-5 accent-cyan-500 mr-4">
        <div>
          <span class="block font-bold text-white text-sm">COPD</span>
          <span class="text-[10px] text-gray-400">Chronic Obstructive Pulmonary Disease</span>
        </div>
      </label>

      <label class="chk-container flex items-center p-4 rounded-lg cursor-pointer">
        <input type="checkbox" value="Bronchitis" class="w-5 h-5 accent-cyan-500 mr-4">
        <div>
          <span class="block font-bold text-white text-sm">Chronic Bronchitis</span>
          <span class="text-[10px] text-gray-400">Recurring inflammation</span>
        </div>
      </label>

      <label class="chk-container flex items-center p-4 rounded-lg cursor-pointer">
        <input type="checkbox" value="None" class="w-5 h-5 accent-cyan-500 mr-4" onchange="toggleNone(this)">
        <div>
          <span class="block font-bold text-white text-sm">No Conditions</span>
          <span class="text-[10px] text-gray-400">Healthy respiratory system</span>
        </div>
      </label>
      
      <div class="mt-4 pt-2 border-t border-gray-800">
        <label class="block text-[10px] text-cyan-500 mb-2 tracking-wider">OTHER CONDITION (OPTIONAL)</label>
        <input type="text" id="other-condition" placeholder="e.g. Cystic Fibrosis" 
               class="w-full bg-[#0d1520] border border-gray-700 rounded p-3 text-sm focus:border-cyan-500 outline-none transition-colors">
      </div>
    </div>

    <button onclick="finishSetup()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-black font-bold font-orbitron py-4 rounded-lg shadow-[0_0_20px_rgba(0,212,255,0.4)] hover:scale-[1.02] transition-transform">
      COMPLETE SETUP
    </button>
  </div>

  <script>
    function toggleNone(checkbox) {
      // If "None" is checked, uncheck everything else
      if(checkbox.checked) {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          if(cb !== checkbox) cb.checked = false;
        });
        document.getElementById('other-condition').value = '';
      }
    }

    async function finishSetup() {
      // 1. Gather all data
      const conditions = [];
      document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        conditions.push(cb.value);
      });

      const other = document.getElementById('other-condition').value;
      if(other.trim()) conditions.push(other);

      // Default to "Healthy" if empty
      if(conditions.length === 0) conditions.push("Healthy");

      // 2. Build the final profile object
      const profile = {
        name: localStorage.getItem('oxy_username') || 'User',
        age: parseInt(localStorage.getItem('oxy_age')) || 0,
        conditions: conditions
      };

      // 3. Save to LocalStorage
      localStorage.setItem('oxtrace_health_profile', JSON.stringify(profile));
      localStorage.setItem('oxy_onboarded', 'true');

      // 4. Save to Firebase
      try {
        const { saveHealthProfile } = await import('./firebase.js');
        await saveHealthProfile(profile);
        console.log('✅ Health profile saved to Firebase');
      } catch(e) {
        console.warn('Firebase save failed (continuing anyway):', e.message);
      }

      // 5. Launch Dashboard
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
