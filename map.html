<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OxyTrace · Mini Map Component</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070b12;
      --panel: rgba(10, 16, 26, 0.92);
      --border: rgba(0, 200, 255, 0.2);
      --accent-blue: #00c8ff;
      --accent-red: #ff3b5c;
      --accent-green: #00e87a;
      --accent-yellow: #ffe944;
      --text: #c8dff0;
      --muted: #4a6680;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Compact Legend for Mini-Map ── */
    #legend {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 800;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    #legend h3 {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-dot.blue  { background: var(--accent-blue); box-shadow: 0 0 5px var(--accent-blue); }
    .leg-dot.red   { background: var(--accent-red); border: 1.5px solid var(--accent-red); border-radius: 2px; }
    .leg-dot.green { background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); }
    .leg-line { width: 15px; height: 0; border-top: 2px dashed var(--accent-yellow); }

    /* ── User Marker Style ── */
    .user-dot-outer {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(0, 200, 255, 0.2);
      border: 2px solid var(--accent-blue);
      box-shadow: 0 0 15px rgba(0,200,255,0.6);
      animation: glow-pulse 2s ease-in-out infinite;
      display: grid; place-items: center;
    }
    .user-dot-inner { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); }
    @keyframes glow-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

    /* ── Hide Leaflet Controls for Clean Look ── */
    .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }

    /* ── Loading Overlay ── */
    #locate-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    #locate-overlay.hidden { display: none; }
    .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="locate-overlay">
  <div class="spinner"></div>
  <p style="font-size: 10px; color: var(--muted); letter-spacing: 2px;">SYNCING GPS...</p>
</div>

<div id="map"></div>

<div id="legend">
  <h3>Navigation</h3>
  <div class="legend-item"><div class="leg-dot blue"></div> User</div>
  <div class="legend-item"><div class="leg-dot red"></div> Danger Zone</div>
  <div class="legend-item"><div class="leg-dot green"></div> Safe Zone</div>
  <div class="legend-item"><div class="leg-line"></div> Route</div>
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
  const map = L.map('map', { zoomControl: false });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  const userIcon = L.divIcon({
    className: '',
    html: <div class="user-dot-outer"><div class="user-dot-inner"></div></div>,
    iconSize: [18, 18], iconAnchor: [9, 9]
  });

  const safeIcon = L.divIcon({
    className: '',
    html: <div style="width:22px;height:22px;border-radius:50%;background:rgba(0,232,122,0.2);border:2px solid #00e87a;box-shadow:0 0 10px #00e87a;display:grid;place-items:center;font-size:10px;">🌿</div>,
    iconSize: [22, 22], iconAnchor: [11, 11]
  });

  function initMap(lat, lng) {
    document.getElementById('locate-overlay').classList.add('hidden');

    const pollutionLat = lat + 0.003;
    const safeLat = lat - 0.003;

    // Center map to show both user and safe zone
    const bounds = L.latLngBounds([[lat, lng], [safeLat, lng]]);
    map.fitBounds(bounds, { padding: [40, 40] });

    // User
    L.marker([lat, lng], { icon: userIcon }).addTo(map);

    // Danger Zone
    L.circle([pollutionLat, lng], {
      radius: 300, color: '#ff3b5c', weight: 1, fillColor: '#ff3b5c', fillOpacity: 0.1, dashArray: '4 4'
    }).addTo(map);

    // Safe Zone
    L.marker([safeLat, lng], { icon: safeIcon }).addTo(map);

    // Navigation Line
    L.polyline([[lat, lng], [safeLat, lng]], {
      color: '#ffe944', weight: 2, opacity: 0.6, dashArray: '5 5'
    }).addTo(map);
  }

  // Real-time GPS check
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => initMap(p.coords.latitude, p.coords.longitude),
      () => initMap(21.1458, 79.0882) // Fallback to Nagpur
    );
  } else {
    initMap(21.1458, 79.0882);
  }
</script>
</body>
</html>
